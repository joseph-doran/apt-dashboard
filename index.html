/* 비밀번호로 임베드 데이터 복호화 (PBKDF2 + AES-GCM, Web Crypto) */
async function decryptData(enc, password) {
  const b = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  const salt = b(enc.salt), iv = b(enc.iv), data = b(enc.ct);
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: enc.iter, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
  return JSON.parse(new TextDecoder().decode(pt));
}
/* 동기화용: 객체를 비밀번호로 암호화 ({salt,iv,ct,iter}) */
async function encryptData(obj, password) {
  const te = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const iter = 150000;
  const baseKey = await crypto.subtle.importKey("raw", te.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: iter, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["encrypt"]);
  const ctBuf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, te.encode(JSON.stringify(obj)));
  const b64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
  return { salt: b64(salt.buffer), iv: b64(iv.buffer), ct: b64(ctBuf), iter };
}
/* 비밀번호 → 동기화 경로용 SHA-256 hex */
async function sha256hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join("");
}

/* ====================== 포맷 유틸 ====================== */
function won(v) {
  if (v == null) return "-";
  const r = Math.round((v / 1e8) * 100) / 100;
  return r.toLocaleString("ko-KR", { maximumFractionDigits: 2 }) + "억";
}
function manwon(v) {
  if (v == null) return "-";
  return Math.round(v / 1e4).toLocaleString("ko-KR") + "만";
}
function pct(v, d = 1) { return v == null || isNaN(v) ? "-" : v.toFixed(d) + "%"; }
function signPct(v, d = 2) { if (v == null || isNaN(v)) return "-"; return (v > 0 ? "+" : "") + v.toFixed(d) + "%"; }

/* ====================== 지역/키/날짜 ====================== */
function provDist(d) {
  const province = d.source;
  const district =
    province === "서울" ? d.region2 || d.region1 || "기타" : d.region1 || d.region2 || "기타";
  return { province, district };
}
function keyOf(d) {
  const { province, district } = provDist(d);
  return [province, district, d.complex_name, d.size].join("|");
}
function dateSortVal(s) {
  if (!s) return Number.MAX_SAFE_INTEGER;
  const t = Date.parse(s);
  if (!isNaN(t)) return t;
  // "2026년 5월 2주" / "2026년 5월" 같은 한글 라벨을 실제 날짜로 환산해 정렬
  const m = String(s).match(/(\d{4})\s*년\s*(\d{1,2})\s*월(?:\s*(\d{1,2})\s*주)?/);
  if (m) return Date.UTC(+m[1], +m[2] - 1, Math.min(28, ((m[3] ? +m[3] : 1) - 1) * 7 + 1));
  return Number.MAX_SAFE_INTEGER;
}

/* ====================== 오버레이(localStorage) ====================== */
function loadOverlay() {
  try {
    const o = JSON.parse(localStorage.getItem(OVERLAY_KEY) || "{}");
    return { edits: o.edits || {}, news: o.news || [], noListing: o.noListing || {} };
  } catch (e) {
    return { edits: {}, news: [], noListing: {} };
  }
}
function saveOverlay(o) {
  localStorage.setItem(OVERLAY_KEY, JSON.stringify(o));
}
/* 두 오버레이 병합 (첫 동기화 시 기기별 입력 보존; 충돌은 a 우선) */
function mergeOverlay(a, b) {
  const out = { edits: { ...(b.edits || {}) }, news: [...(b.news || [])], noListing: { ...(b.noListing || {}), ...(a.noListing || {}) } };
  Object.entries(a.edits || {}).forEach(([k, ed]) => {
    const base = out.edits[k] ? [...(out.edits[k].history || [])] : [];
    const byDate = new Map(base.map((h) => [h.date, h]));
    (ed.history || []).forEach((h) => byDate.set(h.date, { ...(byDate.get(h.date) || {}), ...h }));
    out.edits[k] = { history: [...byDate.values()] };
  });
  (a.news || []).forEach((n) => { if (!out.news.some((x) => keyOf(x) === keyOf(n))) out.news.push(n); });
  return out;
}

/* 원본 + 오버레이 병합 → 원본 스키마 데이터셋(내보내기/렌더 공용) */
function buildDataset(overlay) {
  const map = new Map();
  RAW.forEach((d) => map.set(keyOf(d), { ...d, history: d.history.map((h) => ({ ...h })) }));
  // 사용자가 추가한 신규 단지
  (overlay.news || []).forEach((b) => {
    const k = keyOf(b);
    if (!map.has(k)) map.set(k, { ...b, history: [] });
  });
  // 시세 입력/수정 병합 (날짜 기준 dedupe, 입력값 우선)
  Object.entries(overlay.edits || {}).forEach(([k, ed]) => {
    const rec = map.get(k);
    if (!rec) return;
    const byDate = new Map(rec.history.map((h) => [h.date, h]));
    (ed.history || []).forEach((h) => byDate.set(h.date, { ...(byDate.get(h.date) || {}), ...h }));
    rec.history = [...byDate.values()].sort((a, b) => dateSortVal(a.date) - dateSortVal(b.date));
  });
  return [...map.values()];
}

function lastTwo(history, key) {
  const a = history.filter((h) => h[key] != null);
  return [a[a.length - 2] || null, a[a.length - 1] || null];
}
// noListing 값 정규화: 구버전(true)=둘다없음, 신버전={deal,rent}
function normNone(v) { return v === true ? { deal: true, rent: true } : (v && typeof v === "object" ? v : {}); }
function deriveMetrics(d, manualKeys, noListingMap) {
  const { province, district } = provDist(d);
  const subarea = province === "서울" ? null : d.region2 || null;
  const [prevP, lastP] = lastTwo(d.history, "price");
  const latestPrice = lastP ? lastP.price : null;
  const changePct = lastP && prevP && prevP.price ? ((lastP.price - prevP.price) / prevP.price) * 100 : null;
  const ppArr = d.history.filter((h) => h.per_pyung_price != null);
  const latestPP = ppArr.length ? ppArr[ppArr.length - 1].per_pyung_price : null;
  const re = [...d.history].reverse().find((h) => h.price != null && h.rent != null);
  const jeonseRatio = re ? (re.rent / re.price) * 100 : null;
  const lastRentEntry = [...d.history].reverse().find((h) => h.rent != null);
  const latestRent = lastRentEntry ? lastRentEntry.rent : null;
  const lowDeal = !!(lastP && lastP.deal_low_floor); // 매매가가 저층 매물 기준
  const lowRent = !!(lastRentEntry && lastRentEntry.rent_low_floor);
  // 최신 업데이트 상태 + 매매/전세 '매물없음' 확인 플래그
  let updateStatus = null;
  const k = keyOf(d);
  const none = normNone(noListingMap ? noListingMap[k] : null);
  const dealNone = !!none.deal, rentNone = !!none.rent;
  if (STATUS) {
    const st = STATUS.statuses ? STATUS.statuses[k] || null : null;
    if (st && st !== "success") { // st = 매매 누락 계열
      if (manualKeys && manualKeys.has(k)) updateStatus = "resolved";
      else if (dealNone) updateStatus = "none_confirmed"; // 매매 없음 확인 → 미완료 해소
      else updateStatus = st;
    } else updateStatus = st;
  }
  return { ...d, _id: k, province, district, subarea, latestPrice, latestRent, changePct, latestPP, jeonseRatio, lowDeal, lowRent, updateStatus, dealNone, rentNone };
}

            </div>
            <Field label="단지명"><input value={nName} onChange={(e) => setNName(e.target.value)} placeholder="예: 헬리오시티" className={inputCls} /></Field>
            <div className="grid grid-cols-3 gap-3">
              <Field label="평형"><input type="number" value={nSize} onChange={(e) => setNSize(e.target.value)} placeholder="33" className={inputCls} /></Field>
              <Field label="준공년도"><input type="number" value={nYear} onChange={(e) => setNYear(e.target.value)} placeholder="2018" className={inputCls} /></Field>
              <Field label="세대수"><input type="number" value={nHouse} onChange={(e) => setNHouse(e.target.value)} placeholder="9510" className={inputCls} /></Field>
            </div>
            <Field label="네이버 부동산 링크 (선택)"><input value={nLink} onChange={(e) => setNLink(e.target.value)} placeholder="https://new.land.naver.com/complexes/..." className={inputCls} /></Field>
            {msg && <p className="rounded-lg bg-emerald-500/10 px-3 py-2 text-xs font-medium text-emerald-600 dark:text-emerald-400">{msg}</p>}

          </div>
        )}
      </div>
    </div>
  );
}

const CHART_TABS = [{ key: "price", label: "매매·전세가" }, { key: "ratio", label: "전세가율" }, { key: "pp", label: "매매 평당가" }];
function ChartPanel({ complex, dark }) {
  const [tab, setTab] = useState("price");
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!complex || !canvasRef.current) return;
    const ctx = canvasRef.current.getContext("2d");
    if (chartRef.current) chartRef.current.destroy();
    const labels = complex.history.map((h) => h.date);
    const grid = dark ? "rgba(148,163,184,.12)" : "rgba(100,116,139,.14)";
    const ticks = dark ? "#94a3b8" : "#64748b";
    const legendColor = dark ? "#cbd5e1" : "#475569";
    const mkGrad = (hex) => { const g = ctx.createLinearGradient(0, 0, 0, 320); g.addColorStop(0, hex + "55"); g.addColorStop(1, hex + "03"); return g; };
    const base = { fill: true, tension: 0.35, spanGaps: true, pointRadius: 3, pointHoverRadius: 6, borderWidth: 2.5 };
    let datasets, yFmt, tipFmt;
    if (tab === "price") {
      datasets = [
        { ...base, label: "매매가", data: complex.history.map((h) => h.price), borderColor: "#6366f1", backgroundColor: mkGrad("#6366f1"), pointBackgroundColor: "#6366f1" },
        { ...base, label: "전세가", data: complex.history.map((h) => h.rent), borderColor: "#f59e0b", backgroundColor: mkGrad("#f59e0b"), pointBackgroundColor: "#f59e0b" },
      ];
      yFmt = (v) => (v / 1e8).toFixed(0) + "억"; tipFmt = (c) => c.dataset.label + ": " + won(c.parsed.y);
    } else if (tab === "ratio") {
      datasets = [{ ...base, label: "전세가율", data: complex.history.map((h) => (h.price != null && h.rent != null ? +((h.rent / h.price) * 100).toFixed(1) : null)), borderColor: "#10b981", backgroundColor: mkGrad("#10b981"), pointBackgroundColor: "#10b981" }];
      yFmt = (v) => v + "%"; tipFmt = (c) => "전세가율: " + pct(c.parsed.y);
    } else {
      datasets = [{ ...base, label: "매매 평당가", data: complex.history.map((h) => h.per_pyung_price), borderColor: "#8b5cf6", backgroundColor: mkGrad("#8b5cf6"), pointBackgroundColor: "#8b5cf6" }];
      yFmt = (v) => Math.round(v / 1e4).toLocaleString() + "만"; tipFmt = (c) => "평당가: " + manwon(c.parsed.y);
    }
    chartRef.current = new Chart(ctx, {
      type: "line", data: { labels, datasets },

        plugins: {

          tooltip: { backgroundColor: dark ? "rgba(15,23,42,.95)" : "rgba(255,255,255,.97)", titleColor: dark ? "#e2e8f0" : "#0f172a", bodyColor: dark ? "#cbd5e1" : "#334155", borderColor: dark ? "rgba(148,163,184,.2)" : "rgba(100,116,139,.2)", borderWidth: 1, padding: 12, cornerRadius: 10, usePointStyle: true, callbacks: { label: tipFmt } },
        },
        scales: {
          x: { grid: { color: grid, drawTicks: false }, ticks: { color: ticks, font: { size: 11 } }, border: { display: false } },
          y: { grid: { color: grid, drawTicks: false }, ticks: { color: ticks, font: { size: 11 }, callback: yFmt, maxTicksLimit: 6 }, border: { display: false } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [complex, tab, dark]);

  if (!complex) return (<div className="flex h-[420px] flex-col items-center justify-center gap-3 text-slate-400"><Icon.Chart size={48} className="opacity-40" /><p className="text-sm">표시할 단지를 선택하세요.</p></div>);
  const stats = [
    { label: "매물 호가(최저)", value: won(complex.latestPrice), tone: "text-brand-600 dark:text-brand-300", low: complex.lowDeal },

    { label: "전세가율", value: pct(complex.jeonseRatio), tone: "text-emerald-600 dark:text-emerald-300" },

  return (

      </div>
      <div className="mt-5 flex gap-1.5 rounded-xl bg-slate-100 dark:bg-white/5 p-1">
        {CHART_TABS.map((t) => (<button key={t.key} onClick={() => setTab(t.key)} className={"flex-1 rounded-lg px-3 py-2 text-sm font-semibold transition " + (tab === t.key ? "bg-white dark:bg-slate-700 text-brand-600 dark:text-white shadow-sm" : "text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200")}>{t.label}</button>))}

      <div className="mt-4 h-[340px]"><canvas ref={canvasRef}></canvas></div>
    </div>
  );
}

/* ====================== 평균 전세가율 추이 (회차별) ====================== */
function RatioTrend({ rows, dark }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const trend = useMemo(() => {
    // 실제 수집 회차(원본 데이터에 존재하는 날짜)만 집계 — 수동입력으로 생긴 임시 날짜 제외
    const roundDates = new Set();
    RAW.forEach((d) => (d.history || []).forEach((h) => roundDates.add(h.date)));
    const byDate = {};
    rows.forEach((r) => (r.history || []).forEach((h) => {
      if (h.price != null && h.rent != null && roundDates.has(h.date)) { (byDate[h.date] = byDate[h.date] || []).push((h.rent / h.price) * 100); }
    }));
    return Object.entries(byDate)
      .map(([date, arr]) => ({ date, avg: arr.reduce((a, b) => a + b, 0) / arr.length, n: arr.length }))
      .sort((a, b) => dateSortVal(a.date) - dateSortVal(b.date));
  }, [rows]);

  useEffect(() => {
    if (!canvasRef.current || !trend.length) return;
    const ctx = canvasRef.current.getContext("2d");
    if (chartRef.current) chartRef.current.destroy();
    const grid = dark ? "rgba(148,163,184,.12)" : "rgba(100,116,139,.14)";
    const ticks = dark ? "#94a3b8" : "#64748b";
    const g = ctx.createLinearGradient(0, 0, 0, 160);
    g.addColorStop(0, "#f59e0b55"); g.addColorStop(1, "#f59e0b03");
    chartRef.current = new Chart(ctx, {
      type: "line",
      data: { labels: trend.map((t) => t.date), datasets: [{ label: "평균 전세가율", data: trend.map((t) => +t.avg.toFixed(1)), borderColor: "#f59e0b", backgroundColor: g, fill: true, tension: 0.35, pointRadius: 3, pointHoverRadius: 6, pointBackgroundColor: "#f59e0b", borderWidth: 2.5 }] },
      options: {
        responsive: true, maintainAspectRatio: false, interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: dark ? "rgba(15,23,42,.95)" : "rgba(255,255,255,.97)", titleColor: dark ? "#e2e8f0" : "#0f172a", bodyColor: dark ? "#cbd5e1" : "#334155", borderColor: dark ? "rgba(148,163,184,.2)" : "rgba(100,116,139,.2)", borderWidth: 1, padding: 10, cornerRadius: 10, callbacks: { label: (c) => "평균 전세가율: " + c.parsed.y + "% (" + trend[c.dataIndex].n + "개 단지)" } },
        },
        scales: {
          x: { grid: { color: grid, drawTicks: false }, ticks: { color: ticks, font: { size: 11 } }, border: { display: false } },
          y: { grid: { color: grid, drawTicks: false }, ticks: { color: ticks, font: { size: 11 }, callback: (v) => v + "%", maxTicksLimit: 5 }, border: { display: false } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [trend, dark]);

  if (!trend.length) return null;
  const latest = trend[trend.length - 1], prev = trend.length > 1 ? trend[trend.length - 2] : null;
  const diff = prev ? latest.avg - prev.avg : null;
  return (
    <div className="rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/70 dark:bg-white/[0.03] glass p-5 shadow-sm">
      <div className="flex items-end justify-between">
        <div>
          <h3 className="flex items-center gap-1.5 text-lg font-bold text-slate-900 dark:text-white"><Icon.Percent size={18} /> 평균 전세가율 추이</h3>
          <p className="text-xs text-slate-500 dark:text-slate-400">회차(수집일)별 · 매매·전세 모두 있는 단지 평균</p>
        </div>
        <div className="text-right">
          <p className="text-2xl font-bold text-amber-600 dark:text-amber-400">{latest.avg.toFixed(1)}%</p>
          {diff != null && <p className={"text-xs font-semibold " + (diff > 0 ? "text-rose-500" : diff < 0 ? "text-blue-500" : "text-slate-400")}>{(diff > 0 ? "▲ +" : diff < 0 ? "▼ " : "") + diff.toFixed(1) + "%p"}</p>}
        </div>
      </div>
      <div className="mt-3 h-[160px]"><canvas ref={canvasRef}></canvas></div>
    </div>
  );
}

/* ====================== 회차별 최고 변동 (직전 대비) ====================== */
function TopMovers({ rows }) {
  const data = useMemo(() => {
    const roundDates = new Set();
    RAW.forEach((d) => (d.history || []).forEach((h) => roundDates.add(h.date)));
    const byDate = {};
    rows.forEach((r) => {
      const ph = (r.history || []).filter((h) => h.price != null && roundDates.has(h.date)).sort((a, b) => dateSortVal(a.date) - dateSortVal(b.date));
      for (let i = 1; i < ph.length; i++) {
        if (!ph[i - 1].price) continue;
        const change = ((ph[i].price - ph[i - 1].price) / ph[i - 1].price) * 100;
        (byDate[ph[i].date] = byDate[ph[i].date] || []).push({ name: r.complex_name, size: r.size, change });
      }
    });
    return Object.entries(byDate).map(([date, arr]) => {
      let top = null, bot = null;
      arr.forEach((x) => { if (!top || x.change > top.change) top = x; if (!bot || x.change < bot.change) bot = x; });
      return { date, top, bot };
    }).sort((a, b) => dateSortVal(b.date) - dateSortVal(a.date));
  }, [rows]);

  const Cell = ({ m, up }) => m ? (
    <div className="flex items-center justify-between gap-2">
      <span className="truncate text-slate-700 dark:text-slate-200">{m.name}<span className="ml-1 text-xs text-slate-400">{m.size}평</span></span>
      <span className={"shrink-0 font-bold " + (up ? "text-rose-600 dark:text-rose-400" : "text-blue-600 dark:text-blue-400")}>{signPct(m.change)}</span>
    </div>
  ) : <span className="text-slate-400">-</span>;

  if (!data.length) return null;
  return (
    <div className="rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/70 dark:bg-white/[0.03] glass p-5 shadow-sm">
      <h3 className="flex items-center gap-1.5 text-lg font-bold text-slate-900 dark:text-white"><Icon.TrendUp size={18} /> 회차별 최고 변동</h3>
      <p className="text-xs text-slate-500 dark:text-slate-400">각 회차의 직전 대비 매매가 최고 상승·하락 단지</p>
      <div className="mt-3 max-h-[180px] overflow-y-auto">
        <table className="w-full text-left text-sm">
          <thead className="sticky top-0 bg-white/90 dark:bg-slate-900/90"><tr className="text-xs text-slate-500 dark:text-slate-400"><th className="py-1.5 pr-2 font-semibold">회차</th><th className="py-1.5 px-2 font-semibold">📈 최고 상승</th><th className="py-1.5 pl-2 font-semibold">📉 최고 하락</th></tr></thead>
          <tbody className="divide-y divide-slate-100 dark:divide-white/[0.06]">
            {data.map((d) => (
              <tr key={d.date}>
                <td className="whitespace-nowrap py-2 pr-2 text-xs font-medium text-slate-500 dark:text-slate-400">{d.date}</td>
                <td className="py-2 px-2"><Cell m={d.top} up={true} /></td>
                <td className="py-2 pl-2"><Cell m={d.bot} up={false} /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ====================== 메인 앱 ====================== */
function App() {
  const [dark, setDark] = useState(() => {
    const s = localStorage.getItem("apt-theme");
    if (s) return s === "dark";
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  });
  useEffect(() => { document.documentElement.classList.toggle("dark", dark); localStorage.setItem("apt-theme", dark ? "dark" : "light"); }, [dark]);

  const [overlay, setOverlayState] = useState(loadOverlay);
  const setOverlay = (o) => { saveOverlay(o); setOverlayState(o); };
  const editCount = useMemo(() => Object.values(overlay.edits || {}).reduce((n, e) => n + (e.history ? e.history.length : 0), 0) + (overlay.news || []).length + Object.keys(overlay.noListing || {}).length, [overlay]);

  /* ===== Firebase 실시간 동기화 (암호화) ===== */
  const [syncState, setSyncState] = useState("off"); // off | connecting | on
  const overlayRef = useRef(overlay);
  useEffect(() => { overlayRef.current = overlay; }, [overlay]);
  const syncRef = useRef(null), lastSync = useRef(null), syncReady = useRef(false);

  useEffect(() => {
    if (!ENC || !SYNC_PW || !window.firebase || !FIREBASE_CONFIG.databaseURL) return;
    let ref, alive = true;
    setSyncState("connecting");
    (async () => {
      try {
        if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
        await firebase.auth().signInAnonymously();
        const path = await sha256hex(SYNC_PW);
        ref = firebase.database().ref("sync/" + path);
        syncRef.current = ref;
        ref.on("value", async (snap) => {
          if (!alive) return;
          const val = snap.val();
          try {
            if (!syncReady.current) {
              if (val) {
                const remote = await decryptData(val, SYNC_PW);
                const merged = mergeOverlay(overlayRef.current, remote); // 기기별 입력 보존
                lastSync.current = JSON.stringify(merged); saveOverlay(merged); setOverlayState(merged);
                if (JSON.stringify(merged) !== JSON.stringify(remote)) ref.set(await encryptData(merged, SYNC_PW)).catch(() => {});
              } else { const cur = overlayRef.current; lastSync.current = JSON.stringify(cur); ref.set(await encryptData(cur, SYNC_PW)).catch(() => {}); }
              syncReady.current = true; setSyncState("on"); return;
            }
            if (!val) return;
            const remote = await decryptData(val, SYNC_PW);
            const rjson = JSON.stringify(remote);
            if (rjson === lastSync.current) return; // 자기 자신 echo
            lastSync.current = rjson; saveOverlay(remote); setOverlayState(remote);
          } catch (e) {}
        });
      } catch (e) { console.warn("sync init 실패", e); setSyncState("off"); }
    })();
    return () => { alive = false; if (ref) ref.off(); };
  }, []);

  // 로컬 변경 → 원격 반영
  useEffect(() => {
    if (!syncReady.current || !syncRef.current || !SYNC_PW) return;
    const json = JSON.stringify(overlay);
    if (json === lastSync.current) return;
    lastSync.current = json;
    (async () => { try { await syncRef.current.set(await encryptData(overlay, SYNC_PW)); } catch (e) {} })();
  }, [overlay]);

  const RECORDS = useMemo(() => {
    const manualKeys = new Set();
    if (STATUS) Object.entries(overlay.edits || {}).forEach(([k, ed]) => { if ((ed.history || []).some((h) => h.date >= STATUS.date)) manualKeys.add(k); });
    return buildDataset(overlay).map((d) => deriveMetrics(d, manualKeys, overlay.noListing || {}));
  }, [overlay]);
  const PROVINCES = useMemo(() => [...new Set(RECORDS.map((r) => r.province))], [RECORDS]);

  const [p1, setP1] = useState("");
  const [p2, setP2] = useState("");
  const [cid, setCid] = useState(RECORDS[0] ? RECORDS[0]._id : "");

  const upd = useMemo(() => {

    RECORDS.forEach((r) => { if (r.updateStatus) c[r.updateStatus] = (c[r.updateStatus] || 0) + 1; });
    return { date: STATUS.date, ...c, pending: c.partial + c.nomatch + c.error };
  }, [RECORDS]);

  const openInput = (r) => { setPrefillDate(STATUS ? STATUS.date : TODAY); setCid(r._id); setModal(true); };

  };
  const clearNone = (r) => {

  const district2 = useMemo(() => {
    const pool = p1 ? RECORDS.filter((r) => r.province === p1) : RECORDS;

  }, [p1, RECORDS]);

  const pool = useMemo(() => RECORDS.filter((r) => (!p1 || r.province === p1) && (!p2 || r.district === p2)), [p1, p2, RECORDS]);
  const complexOpts = useMemo(() => [...pool].sort((a, b) => a.complex_name.localeCompare(b.complex_name, "ko")).map((r) => ({ value: r._id, label: r.complex_name + " (" + r.district + ")" })), [pool]);

  const scope = (p1 || "전국") + (p2 ? " · " + p2 : "");

  const exportJson = () => {

  const resetOverlay = () => { if (confirm("이 브라우저에 저장한 입력/추가 내역을 모두 지울까요? (원본 데이터는 유지)")) setOverlay({ edits: {}, news: [] }); };

  return (
    <div className="mx-auto max-w-[1400px] px-4 py-6 sm:px-6 lg:px-8">
      <header className="flex flex-wrap items-center justify-between gap-4">
        <div className="flex items-center gap-3">

          <div>
            <h1 className="text-xl font-bold tracking-tight text-slate-900 dark:text-white sm:text-2xl">아파트 시세 트래킹</h1>
            <p className="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1.5 flex-wrap">
              <span>서울·경기 주요 단지 시세 분석 대시보드{editCount > 0 ? " · 내 입력 " + editCount + "건" : ""}</span>
              {syncState === "on" && <span className="inline-flex items-center gap-1 rounded-md bg-emerald-500/10 px-1.5 py-0.5 font-semibold text-emerald-600 dark:text-emerald-400">● 동기화</span>}
              {syncState === "connecting" && <span className="inline-flex items-center gap-1 rounded-md bg-slate-400/10 px-1.5 py-0.5 font-semibold text-slate-500">동기화 연결 중…</span>}
            </p>

        <div className="flex items-center gap-2">
          <button onClick={() => { setPrefillDate(TODAY); setModal(true); }} className="inline-flex items-center gap-1.5 rounded-xl bg-gradient-to-br from-brand-500 to-violet-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-brand-500/30 transition hover:brightness-110"><Icon.Plus size={17} /> 시세 입력</button>
          <button onClick={exportJson} title="JSON 내보내기" className="inline-flex items-center gap-1.5 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-3.5 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-300 shadow-sm transition hover:bg-slate-50 dark:hover:bg-white/10"><Icon.Download size={17} /> <span className="hidden sm:inline">내보내기</span></button>

          <button onClick={() => setDark((d) => !d)} className="inline-flex items-center gap-2 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 p-2.5 text-slate-600 dark:text-slate-300 shadow-sm transition hover:bg-slate-50 dark:hover:bg-white/10">{dark ? <Icon.Sun size={18} /> : <Icon.Moon size={18} />}</button>
        </div>
      </header>

      <section className="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">

/* ====================== 암호 게이트 (암호 빌드 전용) ====================== */
function Gate() {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [ok, setOk] = useState(false);
  const submit = async (e) => {
    if (e) e.preventDefault();
    setBusy(true); setErr("");
    try { const obj = await decryptData(ENC, pw); RAW = obj.data || []; STATUS = obj.status || null; SYNC_PW = pw; setOk(true); }
    catch (er) { setErr("비밀번호가 올바르지 않습니다."); setBusy(false); }
  };
  if (ok) return <App />;
  return (
    <div className="flex min-h-screen items-center justify-center px-4">
      <form onSubmit={submit} className="w-full max-w-sm rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/80 dark:bg-white/[0.03] glass p-7 shadow-xl">
        <div className="mx-auto mb-4 grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-brand-500 to-violet-600 text-white shadow-lg shadow-brand-500/30"><Icon.Building size={26} /></div>
        <h1 className="text-center text-lg font-bold text-slate-900 dark:text-white">아파트 시세 트래킹</h1>
        <p className="mt-1 text-center text-xs text-slate-500 dark:text-slate-400">비밀번호를 입력하세요</p>
        <input type="password" autoFocus value={pw} onChange={(e) => setPw(e.target.value)} placeholder="비밀번호"
          className="mt-5 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-3.5 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/30" />
        {err && <p className="mt-2 text-xs font-medium text-rose-500">{err}</p>}
        <button type="submit" disabled={busy || !pw} className="mt-4 w-full rounded-xl bg-gradient-to-br from-brand-500 to-violet-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-brand-500/30 transition hover:brightness-110 disabled:opacity-50">{busy ? "확인 중…" : "열기"}</button>
      </form>
    </div>
  );
}
