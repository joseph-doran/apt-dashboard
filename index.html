/* 비밀번호로 임베드 데이터 복호화 (PBKDF2 + AES-GCM, Web Crypto) */
async function decryptData(enc, password) {
  const b = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  const salt = b(enc.salt), iv = b(enc.iv), data = b(enc.ct);
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: enc.iter, hash: "SHA-256" }, baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ====================== 포맷 유틸 ====================== */
function won(v) {
  if (v == null) return "-";
  const r = Math.round((v / 1e8) * 100) / 100;
  return r.toLocaleString("ko-KR", { maximumFractionDigits: 2 }) + "억";
}
function manwon(v) {
  if (v == null) return "-";
  return Math.round(v / 1e4).toLocaleString("ko-KR") + "만";
}
function pct(v, d = 1) { return v == null || isNaN(v) ? "-" : v.toFixed(d) + "%"; }
function signPct(v, d = 2) { if (v == null || isNaN(v)) return "-"; return (v > 0 ? "+" : "") + v.toFixed(d) + "%"; }

/* ====================== 지역/키/날짜 ====================== */
function provDist(d) {
  const province = d.source;
  const district =
    province === "서울" ? d.region2 || d.region1 || "기타" : d.region1 || d.region2 || "기타";
  return { province, district };
}
function keyOf(d) {
  const { province, district } = provDist(d);
  return [province, district, d.complex_name, d.size].join("|");
}
function dateSortVal(s) {
  if (!s) return Number.MAX_SAFE_INTEGER;
  const t = Date.parse(s);
  if (!isNaN(t)) return t;
  // "2026년 5월 2주" / "2026년 5월" 같은 한글 라벨을 실제 날짜로 환산해 정렬
  const m = String(s).match(/(\d{4})\s*년\s*(\d{1,2})\s*월(?:\s*(\d{1,2})\s*주)?/);
  if (m) return Date.UTC(+m[1], +m[2] - 1, Math.min(28, ((m[3] ? +m[3] : 1) - 1) * 7 + 1));
  return Number.MAX_SAFE_INTEGER;
}

/* ====================== 오버레이(localStorage) ====================== */
function loadOverlay() {
  try {
    const o = JSON.parse(localStorage.getItem(OVERLAY_KEY) || "{}");
    return { edits: o.edits || {}, news: o.news || [], noListing: o.noListing || {} };
  } catch (e) {
    return { edits: {}, news: [], noListing: {} };
  }
}
function saveOverlay(o) {
  localStorage.setItem(OVERLAY_KEY, JSON.stringify(o));
}

/* 원본 + 오버레이 병합 → 원본 스키마 데이터셋(내보내기/렌더 공용) */
function buildDataset(overlay) {
  const map = new Map();
  RAW.forEach((d) => map.set(keyOf(d), { ...d, history: d.history.map((h) => ({ ...h })) }));
  // 사용자가 추가한 신규 단지
  (overlay.news || []).forEach((b) => {
    const k = keyOf(b);
    if (!map.has(k)) map.set(k, { ...b, history: [] });
  });
  // 시세 입력/수정 병합 (날짜 기준 dedupe, 입력값 우선)
  Object.entries(overlay.edits || {}).forEach(([k, ed]) => {
    const rec = map.get(k);
    if (!rec) return;
    const byDate = new Map(rec.history.map((h) => [h.date, h]));
    (ed.history || []).forEach((h) => byDate.set(h.date, { ...(byDate.get(h.date) || {}), ...h }));
    rec.history = [...byDate.values()].sort((a, b) => dateSortVal(a.date) - dateSortVal(b.date));
  });
  return [...map.values()];
}

function lastTwo(history, key) {
  const a = history.filter((h) => h[key] != null);
  return [a[a.length - 2] || null, a[a.length - 1] || null];
}

    const k = keyOf(d);

    if (st && st !== "success") {
      if (manualKeys && manualKeys.has(k)) updateStatus = "resolved";
      else if (noListingSet && noListingSet.has(k)) updateStatus = "none_confirmed";
      else updateStatus = st;
    } else updateStatus = st;
  }
  return { ...d, _id: keyOf(d), province, district, subarea, latestPrice, latestRent, changePct, latestPP, jeonseRatio, lowDeal, lowRent, updateStatus };
}

const CHART_TABS = [{ key: "price", label: "매매·전세가" }, { key: "ratio", label: "전세가율" }, { key: "pp", label: "매매 평당가" }];
function ChartPanel({ complex, dark }) {

    const base = { fill: true, tension: 0.35, spanGaps: true, pointRadius: 3, pointHoverRadius: 6, borderWidth: 2.5 };

        },
        scales: {

          y: { grid: { color: grid, drawTicks: false }, ticks: { color: ticks, font: { size: 11 }, callback: yFmt, maxTicksLimit: 6 }, border: { display: false } },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [complex, tab, dark]);

  if (!complex) return (<div className="flex h-[420px] flex-col items-center justify-center gap-3 text-slate-400"><Icon.Chart size={48} className="opacity-40" /><p className="text-sm">표시할 단지를 선택하세요.</p></div>);
  const stats = [
    { label: "매물 호가(최저)", value: won(complex.latestPrice), tone: "text-brand-600 dark:text-brand-300", low: complex.lowDeal },
    { label: "전세 호가(최저)", value: won(complex.latestRent), tone: "text-amber-600 dark:text-amber-300", low: complex.lowRent },
    { label: "전세가율", value: pct(complex.jeonseRatio), tone: "text-emerald-600 dark:text-emerald-300" },
    { label: "평당가", value: manwon(complex.latestPP), tone: "text-violet-600 dark:text-violet-300" },
  ];
  const LowTag = () => (<span className="ml-1 rounded bg-rose-500/15 px-1 py-0.5 text-[10px] font-bold text-rose-600 dark:text-rose-400" title="저층(1~3층) 매물만 있는 시세">저층</span>);
  return (
    <div>
      <div className="flex flex-wrap items-start justify-between gap-3">
        <div>
          <div className="flex items-center gap-2">
            <h3 className="text-lg font-bold text-slate-900 dark:text-white">{complex.complex_name}</h3>
            <span className="rounded-md bg-brand-500/10 px-2 py-0.5 text-xs font-semibold text-brand-600 dark:text-brand-300">{complex.size}평</span>
          </div>
          <p className="mt-0.5 flex items-center gap-1.5 text-sm text-slate-500 dark:text-slate-400">
            <Icon.Map size={14} />{complex.province} · {complex.district}{complex.subarea ? " · " + complex.subarea : ""}{complex.build_year ? " · " + complex.build_year + "년" : ""}{complex.households ? " · " + complex.households.toLocaleString() + "세대" : ""}
          </p>
        </div>
        {complex.link && (<a href={complex.link} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 rounded-xl bg-[#03c75a] px-3.5 py-2 text-sm font-semibold text-white shadow-sm transition hover:brightness-95">네이버 부동산 <Icon.External size={15} /></a>)}
      </div>
      <div className="mt-4 grid grid-cols-2 gap-3 sm:grid-cols-4">
        {stats.map((s) => (<div key={s.label} className="rounded-xl border border-slate-200/70 dark:border-white/10 bg-slate-50/60 dark:bg-white/[0.02] px-3.5 py-2.5"><p className="text-[11px] font-medium text-slate-500 dark:text-slate-400">{s.label}{s.low && <LowTag />}</p><p className={"mt-0.5 text-base font-bold " + s.tone}>{s.value}</p></div>))}
      </div>
      <div className="mt-5 flex gap-1.5 rounded-xl bg-slate-100 dark:bg-white/5 p-1">
        {CHART_TABS.map((t) => (<button key={t.key} onClick={() => setTab(t.key)} className={"flex-1 rounded-lg px-3 py-2 text-sm font-semibold transition " + (tab === t.key ? "bg-white dark:bg-slate-700 text-brand-600 dark:text-white shadow-sm" : "text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200")}>{t.label}</button>))}
      </div>
      <div className="mt-4 h-[340px]"><canvas ref={canvasRef}></canvas></div>
    </div>
  );
}

/* ====================== 랭킹 테이블 ====================== */
function RankingTable({ rows, onPick, selectedId, failOnly, setFailOnly, onInput, onMarkNone }) {
  const [q, setQ] = useState("");
  const [sortKey, setSortKey] = useState("latestPP");
  const [dir, setDir] = useState("desc");
  const filtered = useMemo(() => {
    const kw = q.trim().toLowerCase();
    let list = rows;
    if (failOnly) list = list.filter((r) => r.updateStatus === "partial" || r.updateStatus === "nomatch" || r.updateStatus === "error");
    if (kw) list = list.filter((r) => r.complex_name.toLowerCase().includes(kw) || (r.district || "").toLowerCase().includes(kw) || (r.subarea || "").toLowerCase().includes(kw));
    return [...list].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (av == null && bv == null) return 0;
      if (av == null) return 1; if (bv == null) return -1;
      return dir === "desc" ? bv - av : av - bv;
    });
  }, [rows, q, sortKey, dir, failOnly]);
  const toggleSort = (k) => { if (sortKey === k) setDir((d) => (d === "desc" ? "asc" : "desc")); else { setSortKey(k); setDir("desc"); } };
  const Th = ({ k, children, className }) => (
    <th onClick={() => toggleSort(k)} className={"cursor-pointer select-none whitespace-nowrap px-3 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 transition " + (className || "")}>
      <span className="inline-flex items-center gap-1">{children}{sortKey === k && (dir === "desc" ? <Icon.Down size={13} /> : <Icon.Up size={13} />)}</span>
    </th>
  );
  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div><h3 className="text-lg font-bold text-slate-900 dark:text-white">매매 평당가 랭킹</h3><p className="text-xs text-slate-500 dark:text-slate-400">최근 시세 기준 · 총 {filtered.length}개 단지</p></div>
        <div className="flex items-center gap-2">
          {STATUS && setFailOnly && (
            <button onClick={() => setFailOnly(!failOnly)} className={"rounded-xl border px-3 py-2.5 text-sm font-semibold transition " + (failOnly ? "border-rose-400 bg-rose-500/10 text-rose-600 dark:text-rose-400" : "border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 hover:text-slate-700")}>
              {failOnly ? "전체 보기" : "미완료만"}
            </button>
          )}
          <div className="relative">
            <Icon.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="단지·지역 검색" className="w-44 sm:w-56 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 py-2.5 pl-9 pr-3 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/30" />
          </div>
        </div>
      </div>
      <div className="mt-4 overflow-x-auto rounded-xl border border-slate-200/70 dark:border-white/10">
        <table className="w-full min-w-[720px] text-left text-sm">
          <thead className="border-b border-slate-200/70 dark:border-white/10 bg-slate-50/70 dark:bg-white/[0.03]">
            <tr>
              <th className="px-3 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400">#</th>
              <th className="px-3 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400">단지</th>
              <Th k="latestPrice" className="text-right">매매가</Th>
              <Th k="latestPP" className="text-right">평당가</Th>
              <Th k="jeonseRatio" className="text-right">전세가율</Th>
              <Th k="changePct" className="text-right">직전대비</Th>
              {STATUS && <th className="px-3 py-3 text-center text-xs font-semibold text-slate-500 dark:text-slate-400">업데이트</th>}
              <th className="px-3 py-3 text-right text-xs font-semibold text-slate-500 dark:text-slate-400">링크</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100 dark:divide-white/[0.06]">
            {filtered.map((r, idx) => (
              <tr key={r._id} onClick={() => onPick(r)} className={"cursor-pointer transition " + (r._id === selectedId ? "bg-brand-500/10" : "hover:bg-slate-50 dark:hover:bg-white/[0.04]")}>
                <td className="px-3 py-3"><span className={"inline-flex h-6 min-w-6 items-center justify-center rounded-md px-1.5 text-xs font-bold " + (idx < 3 ? "bg-gradient-to-br from-amber-400 to-orange-500 text-white" : "bg-slate-100 dark:bg-white/10 text-slate-500 dark:text-slate-300")}>{idx + 1}</span></td>
                <td className="px-3 py-3"><div className="font-semibold text-slate-800 dark:text-slate-100">{r.complex_name}<span className="ml-1.5 text-xs font-medium text-slate-400">{r.size}평</span></div><div className="text-xs text-slate-500 dark:text-slate-400">{r.province} · {r.district}{r.subarea ? " · " + r.subarea : ""}</div></td>
                <td className="px-3 py-3 text-right font-semibold text-slate-800 dark:text-slate-100">{won(r.latestPrice)}{r.lowDeal && <span className="ml-1 rounded bg-rose-500/15 px-1 py-0.5 text-[10px] font-bold text-rose-600 dark:text-rose-400" title="저층 매물만 있는 시세">저층</span>}</td>
                <td className="px-3 py-3 text-right font-bold text-violet-600 dark:text-violet-300">{manwon(r.latestPP)}</td>
                <td className="px-3 py-3 text-right text-slate-700 dark:text-slate-200">{pct(r.jeonseRatio)}</td>
                <td className="px-3 py-3 text-right"><ChangeBadge v={r.changePct} /></td>
                {STATUS && (
                  <td className="px-3 py-3 text-center whitespace-nowrap">
                    <StatusBadge s={r.updateStatus} />
                    {(r.updateStatus === "partial" || r.updateStatus === "nomatch" || r.updateStatus === "error") && (
                      <span className="ml-1.5 inline-flex gap-1">
                        {onInput && <button onClick={(e) => { e.stopPropagation(); onInput(r); }} className="rounded-md border border-brand-300 dark:border-brand-500/40 px-1.5 py-0.5 text-[11px] font-semibold text-brand-600 dark:text-brand-300 hover:bg-brand-500/10 transition">입력</button>}
                        {onMarkNone && <button onClick={(e) => { e.stopPropagation(); onMarkNone(r); }} className="rounded-md border border-slate-300 dark:border-white/15 px-1.5 py-0.5 text-[11px] font-semibold text-slate-500 dark:text-slate-400 hover:bg-slate-500/10 transition" title="실제 매물이 없음으로 표시">매물없음</button>}
                      </span>
                    )}
                    {r.updateStatus === "none_confirmed" && onMarkNone && (
                      <button onClick={(e) => { e.stopPropagation(); onMarkNone(r); }} className="ml-1.5 rounded-md border border-slate-300 dark:border-white/15 px-1.5 py-0.5 text-[11px] font-semibold text-slate-400 hover:bg-slate-500/10 transition" title="매물없음 표시 취소">취소</button>
                    )}
                  </td>
                )}
                <td className="px-3 py-3 text-right">{r.link ? (<a href={r.link} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="inline-flex items-center justify-center rounded-lg border border-slate-200 dark:border-white/10 p-1.5 text-slate-500 hover:border-[#03c75a] hover:text-[#03c75a] transition" title="네이버 부동산"><Icon.External size={15} /></a>) : (<span className="text-slate-300">-</span>)}</td>
              </tr>
            ))}
            {filtered.length === 0 && (<tr><td colSpan={STATUS ? 8 : 7} className="px-3 py-12 text-center text-slate-400">{failOnly ? "미완료(매매누락·매물없음·실패) 단지가 없습니다 🎉" : "검색 결과가 없습니다."}</td></tr>)}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ====================== 메인 앱 ====================== */
function App() {
  const [dark, setDark] = useState(() => {
    const s = localStorage.getItem("apt-theme");
    if (s) return s === "dark";
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  });
  useEffect(() => { document.documentElement.classList.toggle("dark", dark); localStorage.setItem("apt-theme", dark ? "dark" : "light"); }, [dark]);

  const [overlay, setOverlayState] = useState(loadOverlay);
  const setOverlay = (o) => { saveOverlay(o); setOverlayState(o); };
  const editCount = useMemo(() => Object.values(overlay.edits || {}).reduce((n, e) => n + (e.history ? e.history.length : 0), 0) + (overlay.news || []).length + Object.keys(overlay.noListing || {}).length, [overlay]);

  const RECORDS = useMemo(() => {
    const manualKeys = new Set();
    if (STATUS) Object.entries(overlay.edits || {}).forEach(([k, ed]) => { if ((ed.history || []).some((h) => h.date >= STATUS.date)) manualKeys.add(k); });
    const noListingSet = new Set(Object.keys(overlay.noListing || {}));
    return buildDataset(overlay).map((d) => deriveMetrics(d, manualKeys, noListingSet));
  }, [overlay]);
  const PROVINCES = useMemo(() => [...new Set(RECORDS.map((r) => r.province))], [RECORDS]);

  const [p1, setP1] = useState("");
  const [p2, setP2] = useState("");
  const [cid, setCid] = useState(RECORDS[0] ? RECORDS[0]._id : "");
  const [modal, setModal] = useState(false);
  const [failOnly, setFailOnly] = useState(false);

  // 업데이트 현황 요약 (필터 적용된 pool 기준은 아래에서, 전체 기준은 RECORDS로)
  const upd = useMemo(() => {
    if (!STATUS) return null;
    const c = { success: 0, partial: 0, nomatch: 0, error: 0, resolved: 0, none_confirmed: 0 };
    RECORDS.forEach((r) => { if (r.updateStatus) c[r.updateStatus] = (c[r.updateStatus] || 0) + 1; });
    return { date: STATUS.date, ...c, pending: c.partial + c.nomatch + c.error };
  }, [RECORDS]);

  const openInput = (r) => { setCid(r._id); setModal(true); };
  const toggleNoListing = (r) => {
    const nl = { ...(overlay.noListing || {}) };
    if (nl[r._id]) delete nl[r._id]; else nl[r._id] = true;
    setOverlay({ ...overlay, noListing: nl });
  };

  const district2 = useMemo(() => {
    const pool = p1 ? RECORDS.filter((r) => r.province === p1) : RECORDS;
    return [...new Set(pool.map((r) => r.district))].sort((a, b) => a.localeCompare(b, "ko"));
  }, [p1, RECORDS]);

  const pool = useMemo(() => RECORDS.filter((r) => (!p1 || r.province === p1) && (!p2 || r.district === p2)), [p1, p2, RECORDS]);
  const complexOpts = useMemo(() => [...pool].sort((a, b) => a.complex_name.localeCompare(b.complex_name, "ko")).map((r) => ({ value: r._id, label: r.complex_name + " (" + r.district + ")" })), [pool]);

  const onP1 = (v) => { setP1(v); setP2(""); };
  useEffect(() => { if (pool.length && !pool.some((r) => r._id === cid)) setCid(pool[0]._id); }, [pool]); // eslint-disable-line
  const selected = useMemo(() => RECORDS.find((r) => r._id === cid) || null, [cid, RECORDS]);

  const kpi = useMemo(() => {
    const wc = pool.filter((r) => r.changePct != null);
    const top = wc.reduce((m, r) => (!m || r.changePct > m.changePct ? r : m), null);
    const bottom = wc.reduce((m, r) => (!m || r.changePct < m.changePct ? r : m), null);
    const ratios = pool.map((r) => r.jeonseRatio).filter((v) => v != null);
    const avgRatio = ratios.length ? ratios.reduce((a, b) => a + b, 0) / ratios.length : null;
    return { count: pool.length, top, bottom, avgRatio };
  }, [pool]);

  const scope = (p1 || "전국") + (p2 ? " · " + p2 : "");

  const exportJson = () => {
    const data = buildDataset(overlay);
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "apartment_data.json"; a.click();
    URL.revokeObjectURL(url);
  };
  const resetOverlay = () => { if (confirm("이 브라우저에 저장한 입력/추가 내역을 모두 지울까요? (원본 데이터는 유지)")) setOverlay({ edits: {}, news: [] }); };

  return (
    <div className="mx-auto max-w-[1400px] px-4 py-6 sm:px-6 lg:px-8">
      <header className="flex flex-wrap items-center justify-between gap-4">
        <div className="flex items-center gap-3">
          <div className="grid h-11 w-11 place-items-center rounded-2xl bg-gradient-to-br from-brand-500 to-violet-600 text-white shadow-lg shadow-brand-500/30"><Icon.Building size={24} /></div>
          <div>
            <h1 className="text-xl font-bold tracking-tight text-slate-900 dark:text-white sm:text-2xl">아파트 시세 트래킹</h1>
            <p className="text-xs text-slate-500 dark:text-slate-400">서울·경기 주요 단지 시세 분석 대시보드{editCount > 0 ? " · 내 입력 " + editCount + "건" : ""}</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setModal(true)} className="inline-flex items-center gap-1.5 rounded-xl bg-gradient-to-br from-brand-500 to-violet-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-lg shadow-brand-500/30 transition hover:brightness-110"><Icon.Plus size={17} /> 시세 입력</button>
          <button onClick={exportJson} title="JSON 내보내기" className="inline-flex items-center gap-1.5 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-3.5 py-2.5 text-sm font-semibold text-slate-600 dark:text-slate-300 shadow-sm transition hover:bg-slate-50 dark:hover:bg-white/10"><Icon.Download size={17} /> <span className="hidden sm:inline">내보내기</span></button>
          {editCount > 0 && <button onClick={resetOverlay} title="내 입력 초기화" className="inline-flex items-center rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 p-2.5 text-slate-500 shadow-sm transition hover:text-rose-500"><Icon.Trash size={17} /></button>}
          <button onClick={() => setDark((d) => !d)} className="inline-flex items-center gap-2 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 p-2.5 text-slate-600 dark:text-slate-300 shadow-sm transition hover:bg-slate-50 dark:hover:bg-white/10">{dark ? <Icon.Sun size={18} /> : <Icon.Moon size={18} />}</button>
        </div>
      </header>

      <section className="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
        <KpiCard icon={Icon.Building} label={"트래킹 단지 수 · " + scope} value={kpi.count.toLocaleString() + "개"} sub="필터 적용 기준" tone="brand" delay={0} />
        <KpiCard icon={Icon.TrendUp} label="직전 대비 최고 상승" value={kpi.top ? signPct(kpi.top.changePct) : "-"} sub={kpi.top ? kpi.top.complex_name : "데이터 없음"} tone="rose" delay={60} />
        <KpiCard icon={Icon.TrendDown} label="직전 대비 최고 하락" value={kpi.bottom ? signPct(kpi.bottom.changePct) : "-"} sub={kpi.bottom ? kpi.bottom.complex_name : "데이터 없음"} tone="emerald" delay={120} />
        <KpiCard icon={Icon.Percent} label="평균 전세가율" value={pct(kpi.avgRatio)} sub={scope + " 평균"} tone="amber" delay={180} />
      </section>

      {upd && (
        <section className="mt-4 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/70 dark:bg-white/[0.03] glass px-5 py-3.5 shadow-sm animate-fade-up">
          <div className="flex flex-wrap items-center gap-x-4 gap-y-1.5 text-sm">
            <span className="font-semibold text-slate-700 dark:text-slate-200">최근 업데이트 {upd.date}</span>
            <span className="text-emerald-600 dark:text-emerald-400">성공 {upd.success}</span>
            {upd.partial > 0 && <span className="text-amber-600 dark:text-amber-400">매매누락 {upd.partial}</span>}
            {upd.nomatch > 0 && <span className="text-slate-500 dark:text-slate-400">미수집 {upd.nomatch}</span>}
            {upd.error > 0 && <span className="text-rose-600 dark:text-rose-400">실패 {upd.error}</span>}
            {upd.resolved > 0 && <span className="text-blue-600 dark:text-blue-400">수동보완 {upd.resolved}</span>}
            {upd.none_confirmed > 0 && <span className="text-slate-500 dark:text-slate-400">매물없음 {upd.none_confirmed}</span>}
          </div>
          {upd.pending > 0 ? (
            <button onClick={() => setFailOnly(true)} className="inline-flex items-center gap-1.5 rounded-xl bg-rose-500/10 px-3.5 py-2 text-sm font-semibold text-rose-600 dark:text-rose-400 transition hover:bg-rose-500/20">
              미완료 {upd.pending}개 입력 필요 →
            </button>
          ) : (
            <span className="rounded-xl bg-emerald-500/10 px-3.5 py-2 text-sm font-semibold text-emerald-600 dark:text-emerald-400">모두 업데이트 완료 🎉</span>
          )}
        </section>
      )}

      <div className="mt-6 grid grid-cols-1 gap-6 xl:grid-cols-3">
        <section className="xl:col-span-2">
          <div className="rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/70 dark:bg-white/[0.03] glass p-5 shadow-sm">
            <div className="grid grid-cols-1 gap-3 sm:grid-cols-3">
              <Select icon={Icon.Map} label="지역1" value={p1} onChange={onP1} placeholder="전체 (서울+경기)" options={PROVINCES.map((p) => ({ value: p, label: p }))} />
              <Select icon={Icon.Layers} label="지역2 (자치구/시)" value={p2} onChange={setP2} placeholder="전체" options={district2.map((d) => ({ value: d, label: d }))} />
              <Select icon={Icon.Building} label="단지명" value={cid} onChange={setCid} options={complexOpts} />
            </div>
          </div>
          <div className="mt-6 rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/70 dark:bg-white/[0.03] glass p-5 shadow-sm"><ChartPanel complex={selected} dark={dark} /></div>
        </section>
        <section className="xl:col-span-1">
          <div className="rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/70 dark:bg-white/[0.03] glass p-5 shadow-sm"><RankingTable rows={pool} onPick={(r) => setCid(r._id)} selectedId={cid} failOnly={failOnly} setFailOnly={setFailOnly} onInput={openInput} onMarkNone={toggleNoListing} /></div>
        </section>
      </div>

      <footer className="mt-10 border-t border-slate-200/70 dark:border-white/10 pt-5 text-center text-xs text-slate-400">데이터는 네이버 부동산 최저가 기준 수기 트래킹값입니다 · 투자 판단의 책임은 이용자 본인에게 있습니다.</footer>

      <InputModal open={modal} onClose={() => setModal(false)} records={RECORDS} defaultId={cid} overlay={overlay} setOverlay={setOverlay} />
    </div>
  );
}
/* ====================== 암호 게이트 (암호 빌드 전용) ====================== */
function Gate() {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [ok, setOk] = useState(false);
  const submit = async (e) => {
    if (e) e.preventDefault();
    setBusy(true); setErr("");
    try { const obj = await decryptData(ENC, pw); RAW = obj.data || []; STATUS = obj.status || null; setOk(true); }
    catch (er) { setErr("비밀번호가 올바르지 않습니다."); setBusy(false); }
  };
  if (ok) return <App />;
  return (
    <div className="flex min-h-screen items-center justify-center px-4">
      <form onSubmit={submit} className="w-full max-w-sm rounded-2xl border border-slate-200/70 dark:border-white/10 bg-white/80 dark:bg-white/[0.03] glass p-7 shadow-xl">
        <div className="mx-auto mb-4 grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-brand-500 to-violet-600 text-white shadow-lg shadow-brand-500/30"><Icon.Building size={26} /></div>
        <h1 className="text-center text-lg font-bold text-slate-900 dark:text-white">아파트 시세 트래킹</h1>
        <p className="mt-1 text-center text-xs text-slate-500 dark:text-slate-400">비밀번호를 입력하세요</p>
        <input type="password" autoFocus value={pw} onChange={(e) => setPw(e.target.value)} placeholder="비밀번호"
          className="mt-5 w-full rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 px-3.5 py-2.5 text-sm outline-none transition focus:border-brand-400 focus:ring-2 focus:ring-brand-400/30" />
        {err && <p className="mt-2 text-xs font-medium text-rose-500">{err}</p>}
        <button type="submit" disabled={busy || !pw} className="mt-4 w-full rounded-xl bg-gradient-to-br from-brand-500 to-violet-600 px-4 py-2.5 text-sm font-bold text-white shadow-lg shadow-brand-500/30 transition hover:brightness-110 disabled:opacity-50">{busy ? "확인 중…" : "열기"}</button>
      </form>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(ENC ? <Gate /> : <App />);
</script>
<script>
  /* 서비스워커 등록 (https 호스팅에서만 — 로컬 file://에선 미동작) */
  if ("serviceWorker" in navigator && location.protocol === "https:") {
    window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
  }
</script>
</body>
